name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload to S3
        run: aws s3 sync ./frontend/build s3://prod-bucket

      - name: Deploy backend
        run: |
          ssh ubuntu@ec2 << 'EOF'
          git pull origin main
          python manage.py migrate
          sudo systemctl restart gunicorn
          sudo systemctl restart celery
          EOF
